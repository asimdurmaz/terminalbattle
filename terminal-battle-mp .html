function generateTasks(d){
  const keys=Object.keys(DIFF_CONFIG);
  const cfg=DIFF_CONFIG[d]||DIFF_CONFIG[keys[Math.floor(Math.random()*keys.length)]];
  const s=shuffle(TASK_POOL.filter(t=>t.tier<=cfg.maxTier));
  return s.slice(0,Math.min(cfg.count,s.length)).map((t,i)=>({...t.fn(),id:i+1}));
}

/* ── DAILY CHALLENGE ── */
function getDailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function seededShuffle(arr,seed){const a=[...arr];let s=seed;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function generateDailyTasks(){
  const seed=getDailySeed();
  // daily always uses all tiers, fixed count 14
  const pool=seededShuffle(TASK_POOL,seed);
  return pool.slice(0,14).map((t,i)=>({...t.fn(),id:i+1}));
}
function getDailyKey(){return "tb_daily_"+getDailySeed();}

/* ── ENDLESS TASK GENERATOR ── */
function getEndlessTier(count){
  if(count<3)  return 1;
  if(count<6)  return 2;
  if(count<10) return 3;
  return 4;
}
/* time reward shrinks as count grows — eventually math works against you */
function getSurvivalTimeReward(count){
  // +8s at start, -0.5s every task, floor at 2s
  // at task 0: 8s, task 5: 5.5s, task 10: 3s, task 12+: 2s
  return Math.max(2, 8 - count*0.5);
}
function generateEndlessTask(count,usedIds){
  const maxTier=getEndlessTier(count);
  const pool=TASK_POOL.filter(t=>t.tier<=maxTier&&!usedIds.has(t.fn.toString().slice(0,40)));
  const available=pool.length>0?pool:TASK_POOL.filter(t=>t.tier<=maxTier);
  const t=pick(available);
  return {...t.fn(),id:Date.now()+Math.random()};
}

function useAudio(sTheme){
  const ctx=useRef(null);
  const get=()=>{if(!ctx.current)ctx.current=new(window.AudioContext||window.webkitAudioContext)();return ctx.current};
  const click=useCallback(()=>{try{const c=get();if(sTheme==="hacker"){const buf=c.createBuffer(1,c.sampleRate*0.018,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.004));const s=c.createBufferSource();s.buffer=buf;const g=c.createGain();g.gain.value=0.12;s.connect(g);g.connect(c.destination);s.start();}else{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="square";o.frequency.value=1320;g.gain.setValueAtTime(0.05,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.035);o.start();o.stop(c.currentTime+0.035);}}catch(e){}},[sTheme]);
  const success=useCallback(()=>{try{const c=get();if(sTheme==="hacker"){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="sine";o.frequency.setValueAtTime(523,c.currentTime);o.frequency.setValueAtTime(659,c.currentTime+0.1);o.frequency.setValueAtTime(784,c.currentTime+0.2);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.45);o.start();o.stop(c.currentTime+0.45);}else{[[0,660],[0.1,880]].forEach(([t,f])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="square";o.frequency.value=f;g.gain.setValueAtTime(0.12,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.09);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.09);});}}catch(e){}},[sTheme]);
  const error=useCallback(()=>{try{const c=get();if(sTheme==="hacker"){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="sawtooth";o.frequency.setValueAtTime(140,c.currentTime);g.gain.setValueAtTime(0.18,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);o.start();o.stop(c.currentTime+0.22);}else{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="square";o.frequency.setValueAtTime(440,c.currentTime);o.frequency.linearRampToValueAtTime(220,c.currentTime+0.18);g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.18);o.start();o.stop(c.currentTime+0.18);}}catch(e){}},[sTheme]);
  const opSuccess=useCallback(()=>{try{const c=get();if(sTheme==="hacker"){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="sine";o.frequency.setValueAtTime(330,c.currentTime);o.frequency.setValueAtTime(415,c.currentTime+0.1);o.frequency.setValueAtTime(494,c.currentTime+0.2);g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);o.start();o.stop(c.currentTime+0.4);}else{[[0,440],[0.1,550]].forEach(([t,f])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="square";o.frequency.value=f;g.gain.setValueAtTime(0.08,c.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.09);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.09);});}}catch(e){}},
  [sTheme]);
  return{click,success,error,opSuccess};
}

      if(e.key==="ArrowDown"){e.preventDefault();if(histIdxRef.current<=0){histIdxRef.current=-1;setInput("",0);return;}const ni=histIdxRef.current-1;histIdxRef.current=ni;const hv=cmdHistRef.current[ni];setInput(hv,hv.length);return;}
      if(e.key==="ArrowLeft"){e.preventDefault();const np=Math.max(0,cursorPosRef.current-1);cursorPosRef.current=np;setCursorPos(np);return;}
      if(e.key==="ArrowRight"){e.preventDefault();const np=Math.min(pInputRef.current.length,cursorPosRef.current+1);cursorPosRef.current=np;setCursorPos(np);return;}
      if(e.key==="Home"){e.preventDefault();cursorPosRef.current=0;setCursorPos(0);return;}

      if(e.key==="Backspace"){e.preventDefault();const pos=cursorPosRef.current;if(pos===0)return;const v=pInputRef.current;const nv=v.slice(0,pos-1)+v.slice(pos);setInput(nv,pos-1);click();

      if(e.key.length===1){const pos=cursorPosRef.current;const v=pInputRef.current;const nv=v.slice(0,pos)+e.key+v.slice(pos);setInput(nv,pos+1);click();
        if(isMultiRef.current){const now=Date.now();if(now-lastTypeSend.current>80){lastTypeSend.current=now;try{connRef.current?.send({type:"typing",text:nv});}catch(e){}}}

  const cleanupPeer=useCallback(()=>{
    try{connRef.current?.close();}catch(e){}
    try{peerRef.current?.destroy();}catch(e){}
    connRef.current=null; peerRef.current=null;
  },[]);

  /* ── AI engine ── */
  const scheduleAI=useCallback((idx,side,d)=>{
    if(!gameActive.current||idx>=tasksRef.current.length) return;
    const task=tasksRef.current[idx];
    const target=side==="win"?task.win:task.lin;
    const {ms,typo}=DIFF_CONFIG[d];
    const prompt=side==="win"?"C:\\Users\\"+aiName.current+">":(aiName.current.toLowerCase()+"@machine:~$");
    let built="",ci=0;
    const typeChar=()=>{
      if(!gameActive.current) return;
      if(ci>=target.length){
        setTimeout(()=>{
          if(!gameActive.current) return;
          const out=side==="win"?task.winOut:task.linOut;
          if(out==="__CLEAR__")clearTerm("opp");else addLine("opp",prompt,target,out);
          setAiTyping("");
          const aiScr=idx+1; aiScoreRef.current=aiScr; setAiTaskIdx(aiScr);
          setAiScore(aiScr); opSuccess();
          setOpFlash(true); setTimeout(()=>setOpFlash(false),600);
          if(aiScr>=tasksRef.current.length){
            gameActive.current=false;
            /* AI finished — player wins only if their current score exceeds AI's */
            setWinner(pScoreRef.current>aiScr?"player":"ai"); setPhase("gameover"); return;
          }
          aiTimer.current=setTimeout(()=>scheduleAI(idx+1,side,d),400+Math.random()*300);
        },ms*1.5);return;
      }
      if(typo>0&&Math.random()<typo&&ci>2){
        const bad=String.fromCharCode(target.charCodeAt(ci)+(Math.random()>0.5?1:-1));
        built+=bad;setAiTyping(built);
        setTimeout(()=>{if(!gameActive.current)return;built=built.slice(0,-1);setAiTyping(built);
          setTimeout(()=>{if(!gameActive.current)return;built+=target[ci];ci++;setAiTyping(built);aiTimer.current=setTimeout(typeChar,ms+Math.random()*ms*0.5);},ms*1.2);},ms*1.5);return;
      }
      built+=target[ci];ci++;setAiTyping(built);
      aiTimer.current=setTimeout(typeChar,ms+Math.random()*ms*0.4);
    };
    aiTimer.current=setTimeout(typeChar,200+Math.random()*400);
  },[addLine,clearTerm,success,opSuccess]);

  /* ── Incoming network messages ── */
  const handleIncoming=useCallback(msg=>{

    const side=pSideRef.current;
    const oppSide=side==="windows"?"lin":"win";
    const oppName=opNameRef.current;
    const oppPrompt=oppSide==="win"?"C:\\Users\\"+oppName+">":(oppName.toLowerCase()+"@machine:~$");
    switch(msg.type){
      case "start":{
        /* guest receives tasks + assigned side from host */
        // guest keeps their own chosen side; learn opponent's side from host
        setOpponentName(msg.hostName||"Host"); opNameRef.current=msg.hostName||"Host";

        setOpponentSide(hostSide); opSideRef.current=hostSide;
        aiName.current=msg.hostName||"HOST";
        const nt=msg.tasks; tasksRef.current=nt; setTasks(nt);

        const guestName=playerName||pInputRef.current||"Player";
        const hostName2=opNameRef.current||"Host";
        const guestIsWin=pSideRef.current==="windows";
        const hostIsWin=(msg.hostSide||"windows")==="windows";
        const pw={prompt:"C:\\Users\\"+guestName+">",cmd:"",output:"Microsoft Windows [Version 10.0.22631]\n(c) Microsoft Corporation. All rights reserved.",id:0};
        const pl={prompt:guestName.toLowerCase()+"@machine:~$",cmd:"",output:"Ubuntu 22.04.3 LTS\nWelcome to Terminal Battle. Type fast. Win faster.",id:1};
        const ow={prompt:"C:\\Users\\"+hostName2+">",cmd:"",output:"Microsoft Windows [Version 10.0.22631]\n(c) Microsoft Corporation. All rights reserved.",id:2};
        const ol={prompt:hostName2.toLowerCase()+"@machine:~$",cmd:"",output:"Ubuntu 22.04.3 LTS\nWelcome to Terminal Battle. Type fast. Win faster.",id:3};
        pHistRef.current=[guestIsWin?pw:pl]; setPHist([guestIsWin?pw:pl]);
        opHistRef.current=[hostIsWin?ow:ol]; setOpHist([hostIsWin?ow:ol]);
        setPScore(0);penaltiesRef.current=0;pScoreRef.current=0;aiScoreRef.current=0;setAiScore(0);setPTaskIdx(0);setAiTaskIdx(0);
        pTaskRef.current=0;aiTaskRef.current=0;
        setAiTyping("");setInput("");setHint(null);
        setRematchReq(null); streakRef.current=0; peakStreakRef.current=0; setStreak(0);
        isMultiRef.current=true; /* set before countdown so net msgs work */
        countdownAfter.current=null;
        setCountdown(3); setPhase("playing");
        break;
      }
      case "progress":{
        const idx=msg.idx;
        const sc=msg.score!==undefined?msg.score:idx;
        aiTaskRef.current=idx; setAiTaskIdx(idx); aiScoreRef.current=sc; setAiScore(sc);

        setOpFlash(true); setTimeout(()=>setOpFlash(false),600);

          const myNow=pScoreRef.current;
          gameActive.current=false;
          setWinner(myNow>=sc?"player":"ai"); setPhase("gameover");
        }
        break;
      }
      case "line":
        {const e={prompt:msg.prompt,cmd:msg.cmd,output:msg.output,id:Date.now()+Math.random()};
        opHistRef.current=[...opHistRef.current,e];setOpHist([...opHistRef.current]);}
        break;
      case "clear":
        opHistRef.current=[];setOpHist([]);
        break;
      case "typing":
        setAiTyping(msg.text||"");
        break;
      case "won":
        if(gameActive.current){
          const theirFinal=msg.score!==undefined?msg.score:aiTaskRef.current;
          const myNow=pScoreRef.current;
          aiScoreRef.current=theirFinal; setAiScore(theirFinal);
          gameActive.current=false;
          setWinner(myNow>theirFinal?"player":"ai"); setPhase("gameover");
        }
        break;
      case "rematch":
        cleanupPeer(); setPhase("login"); setLobbyStatus("idle");
        break;
      case "rematch_req":
        setRematchReq("received");
        break;
      case "rematch_acc":
        /* both go back to login */
        cleanupPeer(); setRematchReq(null); setPhase("login"); setLobbyStatus("idle");
        break;
      case "rematch_dec":
        setRematchReq("declined");
        break;
      default: break;
    }
  },[addLine,clearTerm,success,opSuccess,cleanupPeer,setInput]);
  useEffect(()=>{incomingRef.current=handleIncoming;},[handleIncoming]);

  /* ── AI taunts (solo only) ── */

      else if(Math.abs(pTaskRef.current-aiTaskRef.current)<=1) line=char.reactions.tie;
      else line=pick(char.taunts);
      setAiTaunt(line);
      clearTimeout(tauntTimerRef.current);

  /* ── handleSubmit ── */
  const makeHint=cmd=>{const h=Math.ceil(cmd.length*0.55);return cmd.split("").map((c,i)=>i<h?c:(c===" "?" ":"_")).join("")};
  const handleSubmit=useCallback(()=>{
    if(!gameActive.current) return;
    const cmd=pInputRef.current.trim(); if(!cmd) return;
    cursorPosRef.current=0; setCursorPos(0);
    if(isMultiRef.current){try{connRef.current?.send({type:"typing",text:""});}catch(er){}} /* clear opponent's typing preview */
    if(cmdHistRef.current[0]!==cmd)cmdHistRef.current.unshift(cmd);

    const idx=pTaskRef.current;
    const side=pSideRef.current==="windows"?"win":"lin";
    const prompt=pSideRef.current==="windows"?"C:\\Users\\"+(playerName||"Player")+">":(( playerName||"player").toLowerCase()+"@machine:~$");

    if(cmd.toLowerCase()==="skip"){
      if(idx>=tasksRef.current.length){setInput("");return;}
      streakRef.current=0; setStreak(0);

        survivalTimeRef.current=Math.max(1,survivalTimeRef.current-5);

        taskLogRef.current.push({desc:nextTask.desc,result:"pending",timeMs:null});

      if(isMultiRef.current)netSend({type:"progress",idx:ni,score:Math.max(0,pScoreRef.current)});
      if(!isEndlessRef.current&&ni>=tasksRef.current.length){
        gameActive.current=false; clearTimeout(aiTimer.current);
        if(isMultiRef.current)netSend({type:"won",score:newSkipScore});
        setWinner(Math.max(0,pScoreRef.current)>aiScoreRef.current?"player":"ai"); setPhase("gameover");
      }
      return;
    }
    /* HELP */
    if(cmd.toLowerCase()==="help"){
      if(idx>=tasksRef.current.length){setInput("");return;}
      const t=tasksRef.current[idx];
      const exp=side==="win"?t.win:t.lin;

      const newHelpScore=Math.max(0,pScoreRef.current);
      pScoreRef.current=newHelpScore; setPScore(newHelpScore);
      return;
    }
    /* CURRENT TASK */
    if(idx<tasksRef.current.length){
      const t=tasksRef.current[idx];
      const exp=side==="win"?t.win:t.lin;
      if(cmd.toLowerCase()===exp.toLowerCase()){
        const out=side==="win"?t.winOut:t.linOut;
        if(out==="__CLEAR__")clearTerm("player");else addLine("player",prompt,cmd,out);
        setInput("");setHint(null);
        const ni=idx+1; pTaskRef.current=ni; setPTaskIdx(ni);
        streakRef.current+=1; if(streakRef.current>peakStreakRef.current)peakStreakRef.current=streakRef.current;
        setStreak(streakRef.current);
        if(streakRef.current>0&&streakRef.current%3===0) pScoreRef.current+=0.5;
        /* time bonus: +0.3 if done within 8s, +0.1 if within 15s */

        if(tBonus>0){pScoreRef.current+=tBonus;timeBonusRef.current+=tBonus;setTimeBonusTotal(timeBonusRef.current);}
        taskStartTime.current=Date.now();
        pScoreRef.current+=1; const myFinal=Math.max(0,pScoreRef.current); setPScore(myFinal); success();
        if(taskLogRef.current[idx])taskLogRef.current[idx]={...taskLogRef.current[idx],result:"done",timeMs:Date.now()-gameStartTime.current};

          /* +8s per correct, +3s extra on streak bonus */

  const WinChrome=({label,onClose})=>(

  const renderHist=(hist,pc,cc)=>hist.map(h=>(

  /* S — shared style helpers */
  const S={

    mWrap:   isRetro?{flex:"0 0 calc(30% - 3px)",display:"flex",flexDirection:"column",background:"#c0c0c0",overflow:"hidden",...raised}:{flex:"0 0 calc(30% - 3px)",display:"flex",flexDirection:"column",background:"#000",border:"1px solid #1a2a1a",borderRadius:"2px",overflow:"hidden"},
    mTitle:  isRetro?{padding:"3px 8px",background:"linear-gradient(to right,#000080,#1084d0)",color:"#fff",fontSize:"12px",flexShrink:0}:{padding:"5px 8px",fontSize:"11px",letterSpacing:"0.1em",textAlign:"center",color:"#60a5fa",borderBottom:"2px solid #60a5fa",background:"#001530",flexShrink:0},
    tItem:   st=>{if(isRetro){const b={padding:"3px 6px",marginBottom:"1px",fontSize:"12px",lineHeight:"1.4"};if(st==="done")return{...b,color:"#808080",textDecoration:"line-through"};if(st==="ai-done")return{...b,color:"#804040",textDecoration:"line-through"};if(st==="active")return{...b,color:"#fff",background:"#000080",animation:"rpulse 2s ease-in-out infinite"};return{...b,color:"#202020"};}const b={padding:"4px 6px",marginBottom:"2px",borderRadius:"2px",fontSize:"10.5px",lineHeight:"1.4",borderLeft:"2px solid transparent",transition:"all 0.2s"};if(st==="done")return{...b,color:"#2a5a2a",borderLeftColor:"#2a5a2a",textDecoration:"line-through"};if(st==="ai-done")return{...b,color:"#6a2a2a",borderLeftColor:"#6a2a2a",textDecoration:"line-through"};if(st==="active")return{...b,color:"#7dd3fc",borderLeftColor:"#3b82f6",background:"#001830",boxShadow:"0 0 8px #3b82f620,inset 0 0 8px #3b82f608",animation:"mpulse 2s ease-in-out infinite"};return{...b,color:"#2d5a2d"};},
    mFoot:   isRetro?{padding:"5px 8px",borderTop:"1px solid #808080",background:"#d4d0c8",flexShrink:0}:{padding:"6px 8px",borderTop:"1px solid #0d1a0d",background:"#000805",flexShrink:0},
    lWrap:   {display:"flex",alignItems:"center",justifyContent:"center",flex:1,flexDirection:"column",gap:"6px",padding:"20px",overflowY:"auto"},
    lBox:    isRetro?{width:"min(520px,100%)",background:"#c0c0c0",...raised,padding:0}:{width:"min(520px,100%)",background:"#000",border:"1px solid #00ff4130",boxShadow:"0 0 40px #00ff4110",padding:"24px",borderRadius:"2px"},

  const fmt=s=>Number.isInteger(s)?s:s.toFixed(1);
  const pPrompt=pSide==="windows"?"C:\\Users\\"+playerName+">":playerName.toLowerCase()+"@machine:~$";
  const opPrompt=opponentSide==="windows"?"C:\\Users\\"+opponentName+">":opponentName.toLowerCase()+"@machine:~$";

  /* ════════════ LOGIN ════════════ */
  if(phase==="login"){
    const multiForm=(

        <div style={{display:"flex",gap:"0",marginBottom:"10px"}}>

            <button style={S.startBtn} onClick={findOpponent}>

    const inner=isRetro?(
      <div style={{padding:"14px 18px"}}>
        <div style={{fontSize:"20px",color:"#000080",marginBottom:"4px",textAlign:"center",fontWeight:"bold",letterSpacing:"0.1em"}}>TERMINAL BATTLE</div>
        <div style={{fontSize:"12px",color:"#404040",textAlign:"center",marginBottom:"14px"}}>WIN vs LIN — WHO TYPES FASTER?</div>
        <label style={S.lbl}>Username:</label>
        <input style={S.inp} value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&netMode==="solo")startSoloGame();}} placeholder="enter callsign..." maxLength={16} autoFocus/>
        <label style={S.lbl}>Side:</label>
        <div style={S.bGroup}>
          <button style={S.btn(pSide==="windows","x")} onClick={()=>setPSide("windows")}>⊞ Windows CMD</button>
          <button style={S.btn(pSide==="linux","x")} onClick={()=>setPSide("linux")}>$ Linux Bash</button>
        </div>
        {netMode==="solo"&&<><label style={S.lbl}>Difficulty:</label>
        <div style={S.bGroup}>{Object.entries(DIFF_CONFIG).map(([k,v])=><button key={k} style={S.btn(diff===k,v.col)} onClick={()=>setDiff(k)}>{v.label}</button>)}</div></>}
        <label style={S.lbl}>Visual Theme:</label>
        <div style={S.bGroup}>
          <button style={S.btn(vTheme==="matrix","x")} onClick={()=>setVTheme("matrix")}>▓ Matrix</button>
          <button style={S.btn(vTheme==="retro","x")} onClick={()=>setVTheme("retro")}>⊞ Retro</button>
        </div>
        <label style={S.lbl}>Sound Theme:</label>
        <div style={S.bGroup}>
          <button style={S.btn(sTheme==="hacker","x")} onClick={()=>setSTheme("hacker")}>⌨ Hacker</button>
          <button style={S.btn(sTheme==="retro","x")} onClick={()=>setSTheme("retro")}>🔊 Retro</button>
        </div>
        <label style={S.lbl}>Mode:</label>
        <div style={S.bGroup}>
          <button style={S.btn(netMode==="solo","x")} onClick={()=>setNetMode("solo")}>🤖 vs AI</button>
          <button style={S.btn(netMode==="multi","x")} onClick={()=>setNetMode("multi")}>🌐 Multiplayer</button>
        </div>
        {netMode==="multi"&&multiForm}
        {netMode==="solo"&&<button style={S.startBtn} onClick={startSoloGame}>[ OK — Start vs AI ]</button>}
        <button style={{width:"100%",padding:"4px",background:"#c0c0c0",color:"#000080",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",border:"none",marginTop:"4px",...raised}} onClick={()=>setPhase("guide")}>[ Command Guide ]</button>
        <div style={{marginTop:"8px",color:"#404040",fontSize:"10px",textAlign:"center"}}>Race to complete CLI tasks · Highest score wins</div>
      </div>
    ):(
      <>
        <div style={{textAlign:"center",marginBottom:"14px",userSelect:"none",fontFamily:"'Fira Code',Consolas,monospace"}}>
          <div style={{fontSize:"28px",fontWeight:"bold",letterSpacing:"0.45em",color:"#00ff41",textShadow:"0 0 18px #00ff41, 0 0 36px #00ff4150",animation:"mglow 2s ease-in-out infinite",lineHeight:"1.1"}}>TERMINAL</div>
          <div style={{fontSize:"17px",fontWeight:"300",letterSpacing:"0.85em",color:"#00ff41b0",textShadow:"0 0 10px #00ff41",animation:"mglow 2s ease-in-out infinite",lineHeight:"1.4",paddingLeft:"0.85em"}}>BATTLE</div>
        </div>
        <div style={{color:"#2a6a2a",fontSize:"11px",textAlign:"center",marginBottom:"18px",letterSpacing:"0.15em"}}>— WIN vs LIN · HIGHEST SCORE WINS —</div>
        <label style={S.lbl}>ENTER YOUR USERNAME:</label>
        <input style={S.inp} value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&netMode==="solo")startSoloGame();}} placeholder="type your callsign..." maxLength={16} autoFocus/>
        <label style={S.lbl}>SELECT YOUR SIDE:</label>
        <div style={S.bGroup}>
          <button style={S.btn(pSide==="windows","#60a5fa")} onClick={()=>setPSide("windows")}>⊞ WINDOWS CMD</button>
          <button style={S.btn(pSide==="linux","#4ade80")} onClick={()=>setPSide("linux")}>$ LINUX BASH</button>
        </div>
        {netMode==="solo"&&<><label style={S.lbl}>SELECT DIFFICULTY:</label>
        <div style={S.bGroup}>{Object.entries(DIFF_CONFIG).map(([k,v])=><button key={k} style={S.btn(diff===k,v.col)} onClick={()=>setDiff(k)}>{v.label}</button>)}</div></>}
        <label style={S.lbl}>VISUAL / SOUND THEME:</label>
        <div style={S.bGroup}>
          <button style={S.btn(vTheme==="matrix","#00ff41")} onClick={()=>setVTheme("matrix")}>▓ MATRIX</button>
          <button style={S.btn(vTheme==="retro","#60a5fa")} onClick={()=>setVTheme("retro")}>⊞ RETRO</button>
          <button style={S.btn(sTheme==="hacker","#00ff41")} onClick={()=>setSTheme("hacker")}>⌨ HACKER SFX</button>
          <button style={S.btn(sTheme==="retro","#60a5fa")} onClick={()=>setSTheme("retro")}>🔊 RETRO SFX</button>
        </div>
        <label style={S.lbl}>GAME MODE:</label>
        <div style={S.bGroup}>
          <button style={S.btn(netMode==="solo","#4ade80")} onClick={()=>setNetMode("solo")}>🤖 VS AI</button>
          <button style={S.btn(netMode==="multi","#f472b6")} onClick={()=>setNetMode("multi")}>🌐 MULTIPLAYER</button>
        </div>
        {netMode==="multi"&&<div style={{border:"1px solid #f472b620",background:"#0d001a",padding:"12px",borderRadius:"2px",marginBottom:"12px"}}>{multiForm}</div>}
        {netMode==="solo"&&(
          <button style={S.startBtn} onClick={startSoloGame}
            onMouseOver={e=>e.target.style.background="#002a00"}
            onMouseOut={e=>e.target.style.background="#001a00"}>
            [ INITIALIZE BATTLE ]
          </button>
        )}
        <button style={{width:"100%",padding:"7px",background:"transparent",border:"1px solid #2a5a2a",color:"#3a8a3a",fontSize:"11px",letterSpacing:"0.15em",cursor:"pointer",marginTop:"6px",fontFamily:"inherit",transition:"all 0.2s"}}
          onMouseOver={e=>{e.target.style.borderColor="#4ade80";e.target.style.color="#4ade80";}}
          onMouseOut={e=>{e.target.style.borderColor="#2a5a2a";e.target.style.color="#3a8a3a";}}
          onClick={()=>setPhase("guide")}>
          [ COMMAND GUIDE ]
        </button>
        {/* rank progress */}
        {(()=>{
          const rp=rankData;
          const curRankObj=RANKS.find(r=>r.id===rp.rank)||RANKS[0];
          const nextRankObj=RANKS[RANKS.indexOf(curRankObj)+1];
          return(
            <div style={{marginTop:"10px",textAlign:"center"}}>
              <span style={{fontSize:"10px",color:curRankObj.col,letterSpacing:"0.15em",textShadow:"0 0 8px "+curRankObj.col}}>

                {rp.wins}/{nextRankObj.winsNeeded} wins → {nextRankObj.label}

        {netMode==="solo"&&(

            border:"1px solid "+(dailyDone?"#1a2a4a":"#60a5fa"),

            textShadow:dailyDone?"none":"0 0 8px #60a5fa40"}}
            onClick={()=>{if(!dailyDone)startDailyGame();}}>
            {dailyDone?"[ DAILY DONE ✓ ]":"[ DAILY CHALLENGE ]"}

        {netMode==="solo"&&(

            textShadow:"0 0 8px #fb923c40"}}

        <div style={{marginTop:"6px",color:"#2a5a2a",fontSize:"10px",textAlign:"center",letterSpacing:"0.1em"}}>

        </div>
      </>

    return(
      <div style={S.root}><Overlay/>

  /* ════════════ GUIDE ════════════ */
  if(phase==="guide"){
    const CMDS=[
      {cat:"NAVIGATION",items:[
        {win:"cd",lin:"pwd",desc:"Print current directory path"},
        {win:"cd ..",lin:"cd ..",desc:"Go up one directory level"},
        {win:"dir",lin:"ls",desc:"List files and folders in current directory"},
        {win:"cls",lin:"clear",desc:"Clear all text from the terminal screen"},
      ]},
      {cat:"FILE OPERATIONS",items:[
        {win:"echo > filename",lin:"touch filename",desc:"Create a new empty file"},
        {win:"del filename",lin:"rm filename",desc:"Delete a file permanently"},
        {win:"type filename",lin:"cat filename",desc:"Display contents of a file"},
        {win:"copy src dest/",lin:"cp src dest/",desc:"Copy a file to another location"},
        {win:"move src dest/",lin:"mv src dest/",desc:"Move a file to another location"},
        {win:"ren old new",lin:"mv old new",desc:"Rename a file"},
        {win:"echo text >> file",lin:"echo text >> file",desc:"Append text to end of file"},
      ]},
      {cat:"DIRECTORIES",items:[
        {win:"mkdir dirname",lin:"mkdir dirname",desc:"Create a new directory"},
        {win:"rmdir /s /q dir",lin:"rm -rf dir",desc:"Delete a directory and all its contents"},
      ]},
      {cat:"SYSTEM INFO",items:[
        {win:"whoami",lin:"whoami",desc:"Show the currently logged-in username"},
        {win:"hostname",lin:"hostname",desc:"Show the computer's network name"},
        {win:"date",lin:"date",desc:"Show current system date and time"},
        {win:"set",lin:"printenv",desc:"List all environment variables"},
        {win:"tasklist",lin:"ps aux",desc:"Show all running processes with PIDs"},

        {win:"netstat -an",lin:"ss -an",desc:"Show all active network connections"},
        {win:"dir /s",lin:"df -h",desc:"Show disk space usage"},
        {win:"where git",lin:"which git",desc:"Find the install path of an executable"},
        {win:"arp -a",lin:"arp -a",desc:"Show ARP cache — IP to MAC mappings"},
        {win:"route print",lin:"ip route",desc:"Display the IP routing table"},
      ]},
      {cat:"FILE OPERATIONS (ADVANCED)",items:[
        {win:"dir /a /b dir",lin:"ls -la dir/",desc:"List files in a folder with full details"},
        {win:"more +20 file",lin:"tail -n 20 file",desc:"Show last 20 lines of a file"},
        {win:'find /c /v "" file',lin:"wc -l file",desc:"Count lines in a file"},
        {win:"sort file",lin:"sort file",desc:"Sort file contents alphabetically"},
        {win:"xcopy src dst /E /I",lin:"cp -r src dst",desc:"Recursively copy a directory"},
        {win:"du /s dir",lin:"du -sh dir/",desc:"Show total disk usage of a folder"},
        {win:"tar -czf file.tar.gz dir",lin:"tar -czf file.tar.gz dir",desc:"Archive a directory into a .tar.gz file"},
        {win:"tar -xzf file.tar.gz",lin:"tar -xzf file.tar.gz",desc:"Extract a .tar.gz archive"},
        {win:"icacls file /grant Everyone:(RX)",lin:"chmod 755 file",desc:"Set file permissions to 755"},
        {win:"takeown /f file",lin:"chown root:root file",desc:"Change file owner to root"},
      ]},
      {cat:"SEARCH & COMPARE",items:[
        {win:'findstr "kw" file',lin:'grep "kw" file',desc:"Search for a keyword inside a file"},
        {win:'findstr /s /r "kw" dir\\*',lin:'grep -r "kw" dir/',desc:"Recursively search keyword across all files in a folder"},
        {win:'findstr /c:"kw" file | find /c /v ""',lin:'grep -c "kw" file',desc:"Count occurrences of a keyword in a file"},
        {win:"fc file1 file2",lin:"diff file1 file2",desc:"Compare two files line by line"},
        {win:"forfiles /p dir /s /m *.log /d -7",lin:'find dir -name "*.log" -mtime -7',desc:"Find .log files modified in the last 7 days"},
      ]},
      {cat:"PROCESSES & NETWORK",items:[
        {win:"tasklist /FI \"IMAGENAME eq app.exe\"",lin:"pgrep app",desc:"Show process ID of a running app"},
        {win:"taskkill /IM app.exe",lin:"pkill app",desc:"Terminate a running process by name"},
        {win:"taskkill /F /IM app.exe /T",lin:"pkill -9 app",desc:"Force-kill a process and all its children"},
        {win:"ping domain.com",lin:"ping domain.com",desc:"Test connectivity to a host"},
        {win:"tracert domain.com",lin:"traceroute domain.com",desc:"Trace network hops to a host"},
        {win:"nslookup domain.com",lin:"dig domain.com",desc:"Query DNS records for a domain"},
        {win:"netstat -an | findstr :443",lin:"ss -tlnp | grep :443",desc:"Show what is listening on port 443"},
      ]},
      {cat:"REMOTE & TRANSFER",items:[
        {win:"pscp file user@ip:/home/user/",lin:"scp file user@ip:/home/user/",desc:"Copy a file to a remote server via SSH"},
        {win:"curl -O https://domain.com/file",lin:"curl -O https://domain.com/file",desc:"Download a file from a URL"},
        {win:'curl -X POST https://domain/api -H "Content-Type: application/json" -d "{}\"',lin:'curl -X POST https://domain/api -H "Content-Type: application/json" -d \'{}\'',desc:"Send a POST request with JSON data"},
      ]},
    ];
    const thGreen="#00ff41"; const dimGreen="#1a4a1a"; const midGreen="#2a6a2a";
    return(
      <div style={{fontFamily:"'Fira Code',Consolas,monospace",background:"#050505",height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px)"}}/>
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:998,background:"radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.85) 100%)"}}/>
        {/* header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px",borderBottom:"1px solid #1a2a1a",background:"#000",flexShrink:0}}>
          <button onClick={()=>setPhase("login")} style={{background:"transparent",border:"1px solid #1a3a1a",color:"#4ade80",padding:"4px 12px",fontSize:"11px",cursor:"pointer",letterSpacing:"0.1em",fontFamily:"inherit"}}>← BACK</button>
          <div style={{fontSize:"14px",letterSpacing:"0.2em",color:thGreen,textShadow:"0 0 8px "+thGreen}}>COMMAND GUIDE</div>
          <div style={{width:"80px"}}/>
        </div>
        {/* two-column scroll area */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",alignContent:"start"}}>
          {/* column header */}
          <div style={{gridColumn:"1/-1",display:"grid",gridTemplateColumns:"1fr 1fr 1fr 2fr",gap:"0",borderBottom:"1px solid "+dimGreen,paddingBottom:"4px",marginBottom:"2px"}}>
            {["TIER","WINDOWS CMD","LINUX BASH","WHAT IT DOES"].map((h,i)=>(
              <div key={i} style={{fontSize:"9px",letterSpacing:"0.15em",color:dimGreen,padding:"0 6px"}}>{h}</div>
            ))}
          </div>
          {CMDS.map((cat,ci)=>(
            <div key={ci} style={{gridColumn:"1/-1"}}>
              {/* category heading */}
              <div style={{fontSize:"10px",letterSpacing:"0.2em",color:thGreen,textShadow:"0 0 6px "+thGreen+"80",borderLeft:"2px solid "+thGreen,paddingLeft:"8px",marginBottom:"6px",marginTop:ci>0?"10px":"2px"}}>{cat.cat}</div>
              {cat.items.map((r,ri)=>(
                <div key={ri} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 2fr",gap:"0",marginBottom:"3px",background:ri%2===0?"#050505":"#000",borderRadius:"1px"}}>
                  <div style={{padding:"3px 6px",fontSize:"9px",color:dimGreen,letterSpacing:"0.05em",display:"flex",alignItems:"center"}}>
                    <span style={{display:"inline-block",width:"6px",height:"6px",borderRadius:"50%",background:ri<4?"#4ade80":ri<7?"#60a5fa":ri<10?"#fb923c":"#f43f5e",marginRight:"5px",flexShrink:0}}/>
                  </div>
                  <div style={{padding:"3px 6px",fontSize:"10.5px",color:"#e0e0e0",fontFamily:"'Fira Code',monospace"}}>{r.win}</div>
                  <div style={{padding:"3px 6px",fontSize:"10.5px",color:thGreen,fontFamily:"'Fira Code',monospace",textShadow:"0 0 4px "+thGreen+"40"}}>{r.lin}</div>
                  <div style={{padding:"3px 6px",fontSize:"10px",color:"#556655",lineHeight:"1.4"}}>{r.desc}</div>
                </div>
              ))}
            </div>
          ))}
          {/* free commands note */}
          <div style={{gridColumn:"1/-1",marginTop:"14px",padding:"10px 12px",border:"1px solid "+dimGreen,background:"#000805",borderRadius:"2px"}}>
            <div style={{fontSize:"10px",letterSpacing:"0.15em",color:thGreen,marginBottom:"6px"}}>FREE COMMANDS</div>
            <div style={{fontSize:"10px",color:"#4ade80",lineHeight:"1.7"}}>
              These commands always work at any time, even when they're not your current task:<br/>
              <span style={{color:"#e0e0e0"}}>Windows: </span><span style={{color:"#aaa"}}>cls · dir · date · whoami · hostname · cd · cd..</span><br/>
              <span style={{color:"#e0e0e0"}}>Linux: </span><span style={{color:"#aaa"}}>clear · ls · date · whoami · hostname · pwd · cd..</span>
            </div>
          </div>
          {/* scoring note */}
          <div style={{gridColumn:"1/-1",marginTop:"6px",padding:"10px 12px",border:"1px solid #1a2030",background:"#00040d",borderRadius:"2px"}}>
            <div style={{fontSize:"10px",letterSpacing:"0.15em",color:"#60a5fa",marginBottom:"6px"}}>SPECIAL COMMANDS DURING BATTLE</div>
            <div style={{fontSize:"10px",color:"#60a5fa80",lineHeight:"1.8"}}>
              <span style={{color:"#fb923c",fontFamily:"'Fira Code',monospace"}}>skip</span><span style={{color:"#555"}}> — skip current task, costs </span><span style={{color:"#fb923c"}}>−1 point</span><br/>
              <span style={{color:"#fb923c",fontFamily:"'Fira Code',monospace"}}>help</span><span style={{color:"#555"}}> — reveal a partial hint for current task, costs </span><span style={{color:"#fb923c"}}>−0.5 points</span><br/>
              <span style={{color:"#555",fontSize:"9px"}}>Winning is determined by score. Finishing all tasks locks in your score. Highest score wins — even if opponent finishes first.</span>
            </div>
          </div>
          <div style={{gridColumn:"1/-1",height:"20px"}}/>
        </div>
      </div>
    );
  }

  /* ════════════ LOBBY ════════════ */
  if(phase==="lobby"){
    const isHosting=lobbyStatus==="hosting"||lobbyStatus==="finding";
    const isErr=lobbyStatus==="error";
    const spinnerStyle={display:"inline-block",width:"14px",height:"14px",border:"2px solid #00ff4140",borderTop:"2px solid #00ff41",borderRadius:"50%",animation:"spin 0.8s linear infinite",verticalAlign:"middle",marginRight:"8px"};
    const shareURL=roomCode&&roomCode!=="QUEUE"?buildJoinURL(roomCode):"";
    const lobbyContent=(
      <div style={{padding:isRetro?"14px 18px":"0"}}>
        <div style={{marginBottom:"14px"}}>
          <div style={{fontSize:isRetro?"13px":"11px",color:isRetro?"#000080":"#60a5fa",letterSpacing:"0.1em",marginBottom:"6px"}}>
            {isRetro?"Status:":"STATUS:"}
          </div>
          <div style={{fontSize:isRetro?"14px":"13px",color:isRetro?"#000":"#00ff41",display:"flex",alignItems:"center"}}>
            {!isErr&&<span style={isRetro?{}:spinnerStyle}/>}
            {lobbyMsg||"Initializing..."}
          </div>
        </div>
        {roomCode&&roomCode!=="QUEUE"&&(
          <div style={{marginBottom:"14px"}}>
            <div style={{fontSize:isRetro?"11px":"10px",color:isRetro?"#000080":"#1a4a1a",letterSpacing:"0.08em",marginBottom:"4px"}}>
              {isRetro?"Your Room Code:":"ROOM CODE:"}
            </div>
            <div style={{fontSize:isRetro?"32px":"28px",letterSpacing:"0.4em",color:isRetro?"#000080":"#00ff41",textShadow:isRetro?"none":"0 0 20px #00ff4180",fontWeight:"bold",marginBottom:"8px"}}>{roomCode}</div>
            {shareURL&&(
              <button style={{...S.btn(false,isRetro?"x":"#60a5fa"),marginBottom:"6px",fontSize:"10px"}}
                onClick={()=>{navigator.clipboard?.writeText(shareURL).then(()=>{}).catch(()=>{});alert("Link copied!\n"+shareURL);}}>
                {isRetro?"[ Copy Join Link ]":"⧉ COPY JOIN LINK"}
              </button>
            )}
          </div>
        )}
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"12px"}}>
          {isHosting&&(
            <button style={{padding:"6px 14px",border:"1px solid #fb923c",color:"#fb923c",background:"transparent",fontSize:"11px",cursor:"pointer",letterSpacing:"0.1em",fontFamily:"inherit"}}
              onClick={()=>{clearTimeout(aiFallbackTmr.current);cleanupPeer();isMultiRef.current=false;startSoloGame();}}>
              ⚡ PLAY VS AI INSTEAD
            </button>
          )}
          <button style={{padding:"6px 14px",border:"1px solid #555",color:"#ccc",background:"#111",fontSize:"11px",cursor:"pointer",letterSpacing:"0.1em",fontFamily:"inherit"}}
            onClick={()=>{cleanupPeer();setLobbyStatus("idle");setPhase("login");}}>
            ← MENU
          </button>
        </div>
      </div>
    );
    return(
      <div style={S.root}><Overlay/>
        <div style={S.lWrap}>
          <div style={S.lBox}>
            {isRetro?<WinChrome label="⊞  Terminal Battle — Lobby" onClose={()=>{cleanupPeer();setPhase("login");}}/>:null}
            {!isRetro&&<div style={{fontSize:"11px",letterSpacing:"0.15em",color:"#00ff41",textShadow:"0 0 8px #00ff41",marginBottom:"16px",textAlign:"center"}}>LOBBY</div>}
            {lobbyContent}
          </div>
        </div>
      </div>
    );
  }

  /* ════════════ GAMEOVER ════════════ */
  if(phase==="gameover"){
    const isDisconn=winner==="disconnect";
    const won=winner==="player";
    const endlessFinished=isEndless&&!isDisconn;
    const col=isRetro?(won?"#000080":"#cc0000"):(won?"#00ff41":"#f43f5e");
    /* particle burst chars */
    const BURST_CHARS="01><$#@!%&*[]{}|/\\~^";
    const burstItems=Array.from({length:28},(_,i)=>({
      id:i,
      char:BURST_CHARS[Math.floor(Math.random()*BURST_CHARS.length)],
      x:20+Math.random()*60,  // vw %
      delay:Math.random()*0.6,
      dur:0.9+Math.random()*0.8,
      col:won?"#00ff41":"#f43f5e"
    }));
    return(
      <div style={S.root}><Overlay/>
      {/* particle burst */}
      {!isDisconn&&burstItems.map(p=>(
        <div key={p.id} style={{
          position:"fixed",left:p.x+"vw",top:"-20px",
          fontSize:"14px",fontFamily:"'Fira Code',Consolas,monospace",
          color:p.col,opacity:0,pointerEvents:"none",zIndex:990,
          textShadow:"0 0 6px "+p.col,
          animation:`fall ${p.dur}s ${p.delay}s ease-in forwards`
        }}>{p.char}</div>
      ))}

        <div style={S.goWrap}>
        <div style={{...S.goBox(won),animation:"goentry 0.45s ease-out",position:"relative",overflow:"hidden"}}>
            {isRetro&&<WinChrome label="⊞ Battle Result" onClose={()=>{}}/>}
            <div style={{padding:isRetro?"16px 0 0 0":"0"}}>
              <div style={{fontSize:isRetro?"12px":"10px",letterSpacing:"0.2em",color:col,marginBottom:"10px"}}>
                {isDisconn?"BATTLE ENDED":endlessFinished?"SURVIVAL COMPLETE":"BATTLE COMPLETE"}
              </div>
              {/* main title with glitch layers */}
              <div style={{position:"relative",marginBottom:"8px",display:"inline-block"}}>
                <div style={{fontSize:isRetro?"26px":"32px",fontWeight:"bold",color:col,
                  textShadow:isRetro?"none":(won?"0 0 30px "+col+",0 0 60px "+col+"60":"0 0 20px "+col),
                  animation:won?"victpulse 2s ease-in-out infinite":"flash 1.2s ease-in-out infinite"}}>
                  {isDisconn?"DISCONNECTED":endlessFinished?"TIME'S UP":won?"VICTORY":"DEFEATED"}
                </div>
                {!isRetro&&!won&&!isDisconn&&<>
                  <div style={{position:"absolute",inset:0,fontSize:"32px",fontWeight:"bold",
                    color:"#f43f5e",animation:"glitch1 2.5s step-end infinite",pointerEvents:"none"}}>DEFEATED</div>
                  <div style={{position:"absolute",inset:0,fontSize:"32px",fontWeight:"bold",
                    color:"#60a5fa",animation:"glitch2 2.5s step-end infinite 0.1s",pointerEvents:"none"}}>DEFEATED</div>
                </>
                }
              </div>
              {isDisconn&&<div style={{fontSize:"12px",color:isRetro?"#404040":"#555",marginBottom:"16px"}}>Opponent disconnected.</div>}
              {!isDisconn&&<>
                <div style={{fontSize:isRetro?"12px":"13px",color:isRetro?"#404040":"#555",marginBottom:"24px"}}>
                  {endlessFinished
                  ?`${endlessCount} tasks · score ${fmt(pScore)}${endlessBest>=pScore?" · best: "+fmt(endlessBest):" · NEW BEST!"}`
                  :won?`${playerName} wins with ${fmt(pScore)} pts`:`${opponentName} scored ${fmt(aiScore)} · You scored ${fmt(pScore)}`
                }
                {!isMultiRef.current&&!endlessFinished&&timeBonusTotal>0&&<span style={{fontSize:"10px",color:"#60a5fa",marginLeft:"6px"}}>+{fmt(timeBonusTotal)} time bonus</span>}
                </div>
                {endlessFinished?(
                  <div style={{textAlign:"center",marginBottom:"28px"}}>
                    <div style={{fontSize:"11px",color:"#555",marginBottom:"4px",letterSpacing:"0.1em"}}>SCORE</div>
                    <div style={{fontSize:"48px",fontWeight:"bold",color:pScore>endlessBest?"#fb923c":(pSide==="linux"?linGlow:winGlow),
                      textShadow:"0 0 20px currentColor"}}>{(Math.round(pScore*10)/10).toFixed(1)}</div>
                    {pScore>endlessBest&&<div style={{fontSize:"10px",color:"#fb923c",letterSpacing:"0.2em",animation:"spulse 1s infinite"}}>NEW BEST</div>}
                    {endlessBest>0&&pScore<=endlessBest&&<div style={{fontSize:"10px",color:"#555",marginTop:"4px"}}>best: {fmt(endlessBest)}</div>}
                  </div>
                ):(
                  <div style={{display:"flex",justifyContent:"center",gap:"30px",marginBottom:"28px"}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:"10px",color:isRetro?"#000080":"#aaa",letterSpacing:"0.1em"}}>{playerName}</div>
                      <div style={{fontSize:"28px",color:isRetro?(won?"#000080":"#800000"):(pSide==="linux"?linGlow:winGlow)}}>{fmt(pScore)}</div>
                    </div>
                    <div style={{fontSize:"24px",color:isRetro?"#606060":"#3a6a3a",paddingTop:"8px"}}>vs</div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:"10px",color:isRetro?"#000080":"#aaa",letterSpacing:"0.1em"}}>{opponentName}</div>
                      <div style={{fontSize:"28px",color:isRetro?(!won?"#000080":"#800000"):(opponentSide==="linux"?linGlow:winGlow)}}>{fmt(aiScore)}</div>
                    </div>
                  </div>
                )}
              </>}
              {/* ── Post-game breakdown ── */}
              {/* endless leaderboard */}
              {endlessFinished&&SB_CONFIGURED&&(
                <div style={{marginBottom:"20px",textAlign:"left"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
                    <div style={{fontSize:"10px",letterSpacing:"0.15em",color:"#fb923c"}}>LEADERBOARD</div>
                    {!showLb&&!lbLoading&&leaderboard.length>0&&(
                      <button onClick={()=>setShowLb(true)}
                        style={{background:"transparent",border:"1px solid #fb923c40",color:"#fb923c",fontSize:"9px",
                          letterSpacing:"0.1em",padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}}>
                        SHOW
                      </button>
                    )}
                    {showLb&&<button onClick={()=>setShowLb(false)}
                      style={{background:"transparent",border:"1px solid #fb923c40",color:"#fb923c60",fontSize:"9px",
                        letterSpacing:"0.1em",padding:"2px 8px",cursor:"pointer",fontFamily:"inherit"}}>
                      HIDE
                    </button>}
                  </div>
                  {lbLoading&&<div style={{fontSize:"10px",color:"#555",letterSpacing:"0.1em"}}>posting score...</div>}
                  {!lbLoading&&!SB_CONFIGURED&&<div style={{fontSize:"10px",color:"#555"}}>configure Supabase to enable leaderboard</div>}
                  {showLb&&leaderboard.length>0&&(
                    <div style={{maxHeight:"160px",overflowY:"auto"}}>
                      {leaderboard.map((row,i)=>{
                        const isMe=row.name===(playerName||"Player")&&row.score===pScore;
                        return(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",
                            padding:"3px 6px",marginBottom:"2px",borderRadius:"2px",
                            background:isMe?"#181000":"transparent",
                            border:isMe?"1px solid #fb923c30":"1px solid transparent"}}>
                            <span style={{fontSize:"9px",color:i===0?"#fb923c":i===1?"#888":i===2?"#7a5c00":"#333",
                              minWidth:"14px",textAlign:"right"}}>{i+1}</span>
                            <span style={{fontSize:"10px",color:isMe?"#fb923c":"#aaa",flex:1,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.name}</span>
                            <span style={{fontSize:"10px",color:isMe?"#fb923c":"#666",minWidth:"28px",textAlign:"right"}}>{row.score}</span>
                            <span style={{fontSize:"9px",color:"#333",minWidth:"40px",textAlign:"right"}}>{row.tasks}t</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {showLb&&leaderboard.length===0&&!lbLoading&&<div style={{fontSize:"10px",color:"#555"}}>no scores yet</div>}
                </div>
              )}
              {/* rank up notification */}
              {!isMultiRef.current&&(()=>{
                const rp=rankData;
                const curR=RANKS.find(r=>r.id===rp.rank)||RANKS[0];
                const idx=RANKS.indexOf(curR);
                const prev=RANKS[idx-1];
                const justUnlocked=prev&&rp.wins===curR.winsNeeded;
                return justUnlocked?(
                  <div style={{fontSize:isRetro?"13px":"11px",color:curR.col,letterSpacing:"0.15em",
                    textShadow:"0 0 12px "+curR.col,marginBottom:"10px",animation:"spulse 1s infinite"}}>
                    ↑ RANK UP: {curR.label}
                  </div>
                ):null;
              })()}
              {!isDisconn&&taskLogRef.current.length>0&&(
                <div style={{margin:"12px 0 16px 0",maxHeight:"160px",overflowY:"auto",borderTop:"1px solid #1a2a1a",paddingTop:"8px"}}>
                  <div style={{fontSize:isRetro?"10px":"9px",letterSpacing:"0.1em",color:isRetro?"#000080":"#555",marginBottom:"4px"}}>TASK BREAKDOWN</div>
                  {taskLogRef.current.map((t,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:isRetro?"11px":"9.5px",padding:"2px 0",borderBottom:isRetro?"1px solid #bbb":"1px solid #111",
                      color:t.result==="done"?(isRetro?"#000080":"#00ff4190"):t.result==="skip"?(isRetro?"#804000":"#fb923c80"):"#333"}}>
                      <span style={{maxWidth:"70%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i+1}. {t.desc}</span>
                      <span>{t.result==="done"?("✓ "+(t.timeMs/1000).toFixed(1)+"s"):t.result==="skip"?"SKIP":"—"}</span>
                    </div>
                  ))}
                  {peakStreakRef.current>=3&&<div style={{fontSize:"9px",color:isRetro?"#804000":"#fb923c",marginTop:"4px"}}>🔥 Peak streak: {peakStreakRef.current}</div>}
                </div>
              )}
              {/* ── Buttons / rematch flow ── */}
              {rematchReq==="received"?(
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:isRetro?"12px":"10px",color:isRetro?"#000080":"#60a5fa",marginBottom:"8px",letterSpacing:"0.1em"}}>Opponent wants a rematch</div>
                  <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
                    <button style={{...S.startBtn,width:"auto",padding:isRetro?"5px 22px":"8px 28px"}}
                      onClick={()=>{netSend({type:"rematch_acc"});cleanupPeer();setRematchReq(null);setPhase("login");setLobbyStatus("idle");}}>
                      {isRetro?"[ Accept ]":"ACCEPT"}
                    </button>
                    <button style={{...S.btn(false,isRetro?"x":"#f43f5e"),padding:isRetro?"5px 22px":"8px 28px",fontSize:isRetro?"13px":"11px"}}
                      onClick={()=>{netSend({type:"rematch_dec"});setRematchReq(null);}}>
                      {isRetro?"[ Decline ]":"DECLINE"}
                    </button>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",gap:"8px",justifyContent:"center",flexDirection:"column",alignItems:"center"}}>
                  {rematchReq==="sent"&&<div style={{fontSize:"9px",color:isRetro?"#808080":"#555",letterSpacing:"0.1em",marginBottom:"4px"}}>Waiting for opponent...</div>}
                  {rematchReq==="declined"&&<div style={{fontSize:"9px",color:isRetro?"#cc0000":"#f43f5e",letterSpacing:"0.1em",marginBottom:"4px"}}>Rematch declined.</div>}
                  <div style={{display:"flex",gap:"8px"}}>
                    <button style={{...S.startBtn,width:"auto",padding:isRetro?"5px 22px":"8px 28px"}}
                      onClick={()=>{gameActive.current=false;clearTimeout(aiTimer.current);clearInterval(endlessTimerRef.current);cleanupPeer();isMultiRef.current=false;isEndlessRef.current=false;setIsEndless(false);setRematchReq(null);setPhase("login");setLobbyStatus("idle");setConnStatus("");}}>
                      {isRetro?"[ Menu ]":"MENU"}
                    </button>
                    {isMultiRef.current&&rematchReq!=="sent"&&(
                      <button style={{...S.btn(false,isRetro?"x":"#60a5fa"),padding:isRetro?"5px 22px":"8px 28px",fontSize:isRetro?"13px":"11px"}}
                        onClick={()=>{netSend({type:"rematch_req"});setRematchReq("sent");}}>
                        {isRetro?"[ Rematch? ]":"REMATCH?"}
                      </button>
                    )}
                    {!isMultiRef.current&&(
                      <button style={{...S.btn(false,isRetro?"x":"#60a5fa"),padding:isRetro?"5px 22px":"8px 28px",fontSize:isRetro?"13px":"11px"}}
                        onClick={()=>{gameActive.current=false;clearTimeout(aiTimer.current);clearInterval(endlessTimerRef.current);
                          if(endlessFinished)startEndlessGame();else startSoloGame();}}>
                        {endlessFinished?(isRetro?"[ Again ]":"AGAIN"):(isRetro?"[ Rematch ]":"REMATCH")}
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ════════════ GAME ════════════ */
  return(
    <div style={{...S.root,animation:shake?"shake 0.4s ease-in-out":"none"}}>
      <Overlay/>
      {/* HEADER */}
      <div style={S.header}>
        <div style={S.badge(pSide==="linux"?linGlow:winGlow)}>
          {playerName} · {fmt(pScore)}/{tasks.length}
          {isMultiRef.current&&<span style={{fontSize:"9px",opacity:0.6,marginLeft:"4px"}}>🌐</span>}
        </div>
        <div style={S.logo}>
          {isRetro?<span>WIN ⚔ LIN</span>:<><span style={{color:winGlow,textShadow:"0 0 6px "+winGlow}}>WIN</span><span style={{color:"#1a3a1a",margin:"0 8px"}}>⚔</span><span style={{color:linGlow,textShadow:"0 0 10px "+linGlow}}>LIN</span></>}
        </div>
        {isEndless?(
          <div style={{...S.badge(endlessTimeLeft<=10?"#f43f5e":endlessTimeLeft<=20?"#fb923c":"#60a5fa"),
            fontSize:"13px",fontWeight:"bold",minWidth:"120px"}}>
            {Math.floor(endlessTimeLeft/60)}:{String(endlessTimeLeft%60).padStart(2,"0")}
            <span style={{fontSize:"9px",marginLeft:"4px",opacity:0.7}}>LEFT</span>
          </div>
        ):(
          <div style={S.badge(opponentSide==="linux"?linGlow:winGlow)}>
            {opponentName} · {aiScore}/{tasks.length}
            {isMultiRef.current&&<span style={{fontSize:"9px",opacity:0.6,marginLeft:"4px"}}>🌐</span>}
          </div>
        )}
      </div>
      {/* PANELS */}
      <div style={S.panels}>
        {/* PLAYER — always LEFT, styled by their chosen side */}
        {(()=>{
          const isW=pSide==="windows";
          const gl=isW?winGlow:linGlow;
          const pc=isW?(isRetro?"#c0c0c0":"#909090"):(isRetro?"#00cc00":"#00cc33");
          const cc=isW?(isRetro?"#fff":"#e0e0e0"):(isRetro?"#00ff00":"#00ff41");
          return(
            <div style={{...S.tWrap(gl),flex:isEndless?"1":"0 0 calc(35% - 3px)"}}>
              {isRetro?<WinChrome label={isW?"⊞  C:\\> — YOU":"$  bash — YOU"}/>:<div style={S.tHdr(gl)}>{isW?"⊞ WINDOWS CMD":"$ LINUX BASH"} · {isEndless?"SURVIVAL":"YOU"}</div>}
              <div style={S.tBody} ref={pTermRef}>
                {renderHist(pHist,pc,cc)}
                {(()=>{const before=pInput.slice(0,cursorPos);const after=pInput.slice(cursorPos);return(<div><span style={{color:pc}}>{pPrompt} </span><span style={{color:cc}}>{before}</span><span style={S.cur(gl)}/><span style={{color:cc}}>{after}</span></div>);})()}
              </div>
            </div>
          );
        })()}
        {/* MIDDLE */}
        <div style={S.mWrap}>
          {isRetro?<WinChrome label="📋  Tasks"/>:(
            <div style={S.mTitle}>
              {isEndless?`SURVIVAL · T${getEndlessTier(endlessCount)} · ${endlessCount} done`:"TASKS"}
            </div>
          )}
          <div style={{flex:1,overflowY:"auto",padding:"4px",background:isRetro?"#c0c0c0":"transparent"}}>
            {tasks.map((t,i)=>{
              const st=getState(i,pTaskIdx,aiTaskIdx);
              return <div key={t.id} style={S.tItem(st)}>{st==="done"||st==="ai-done"?"✓ ":st==="active"?"▶ ":"  "}{t.desc}</div>;
            })}
          </div>
          <div style={S.mFoot}>
            <div style={{fontSize:isRetro?"10px":"9px",color:isRetro?"#000080":"#1a4a1a",letterSpacing:"0.08em",marginBottom:"2px"}}>{isRetro?"Current Task:":"CURRENT TASK:"}</div>
            <div style={{fontSize:isRetro?"12px":"10.5px",color:isRetro?"#000080":"#60a5fa",textShadow:isRetro?"none":"0 0 6px #3b82f660",marginBottom:hint?"4px":"0"}}>
              {pTaskIdx<tasks.length?tasks[pTaskIdx].desc:"ALL DONE!"}
            </div>
            {/* soft task timer */}
            {taskTimer!==null&&!isMultiRef.current&&(
              <div style={{display:"flex",alignItems:"center",gap:"4px",marginBottom:"2px"}}>
                <div style={{flex:1,height:"2px",background:"#0d1a0d",borderRadius:"1px"}}>
                  <div style={{height:"2px",borderRadius:"1px",width:Math.max(0,Math.min(100,(taskTimer/20)*100))+"%",
                    background:taskTimer>10?"#4ade80":taskTimer>5?"#fb923c":"#f43f5e",
                    transition:"width 0.5s linear,background 0.3s"}}></div>
                </div>
                <span style={{fontSize:"9px",color:taskTimer>10?"#2a5a2a":taskTimer>5?"#fb923c80":"#f43f5e80",minWidth:"18px",textAlign:"right"}}>
                  {taskTimer>0?taskTimer+"s":"over"}
                </span>
              </div>
            )}
            {hint&&<div style={{fontSize:isRetro?"11px":"10px",color:isRetro?"#804000":"#fb923c",letterSpacing:"0.05em"}}>⚑ {hint}</div>}
            <div style={{display:"flex",gap:"8px",marginTop:"4px",fontSize:isRetro?"10px":"9px",color:isRetro?"#808080":"#1a3a1a"}}>
              <span style={{color:isRetro?"#804000":"#fb923ca0"}}>skip</span><span>−1pt</span><span>·</span>
              <span style={{color:isRetro?"#804000":"#fb923ca0"}}>help</span><span>−0.5pt</span>
            </div>
            {isEndless&&!isRetro&&(
              <div style={{fontSize:"9px",color:endlessTimeLeft<=10?"#f43f5e":endlessTimeLeft<=20?"#fb923c":"#4ade8060",marginTop:"4px",letterSpacing:"0.08em"}}>
                correct: +{getSurvivalTimeReward(endlessCount).toFixed(1)}s · skip: −5s · wrong: −3s
              </div>
            )}
            {streak>=2&&<div style={{marginTop:"4px",fontSize:isRetro?"11px":"9px",color:isRetro?"#804000":"#fb923c",animation:"spulse 1.2s ease-in-out infinite",letterSpacing:"0.08em"}}>🔥 {streak}x STREAK{streak>=3?" +bonus":""}</div>}
          </div>
        </div>
        {/* OPPONENT — always RIGHT, hidden in endless */}
        {!isEndless&&(()=>{
          const isW=opponentSide==="windows";
          const gl=isW?winGlow:linGlow;
          const pc=isW?(isRetro?"#c0c0c0":"#909090"):(isRetro?"#00cc00":"#00cc33");
          const cc=isW?(isRetro?"#fff":"#e0e0e0"):(isRetro?"#00ff00":"#00ff41");
          return(
            <div style={{...S.tWrap(gl),animation:opFlash?"opflash 0.6s ease-out":"none",position:"relative"}}>
              {isRetro?<WinChrome label={(isW?"⊞  C:\\> — ":"$  bash — ")+opponentName+(isMultiRef.current?" 🌐":"")}/>
                      :<div style={S.tHdr(gl)}>{isW?"⊞ WINDOWS CMD":"$ LINUX BASH"} · {opponentName}{isMultiRef.current?" 🌐":""}</div>}
              {aiTaunt&&!isMultiRef.current&&(
                <div style={{position:"absolute",top:"28px",right:"8px",background:"#111",border:"1px solid #f43f5e60",color:"#f43f5e",fontSize:"9px",padding:"3px 7px",borderRadius:"2px",zIndex:10,maxWidth:"120px",textAlign:"right",letterSpacing:"0.05em",boxShadow:"0 0 10px #f43f5e20",animation:"goshow 0.2s ease-out",pointerEvents:"none"}}>
                  {aiTaunt}
                </div>
              )}
              <div style={S.tBody} ref={opTermRef}>
                {renderHist(opHist,pc,cc)}
                <div><span style={{color:pc}}>{opPrompt} </span><span style={{color:cc}}>{aiTyping}</span><span style={S.cur(gl)}/></div>
              </div>
            </div>
          );
        })()}
      </div>
      {/* COUNTDOWN OVERLAY */}
      {countdown!==null&&(
        <div style={{position:"fixed",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.78)",zIndex:1000,pointerEvents:"all"}}>
          {countdown>0?(
            <div style={{fontSize:"120px",fontWeight:"bold",color:countdown===3?"#f43f5e":countdown===2?"#fb923c":"#00ff41",
              textShadow:"0 0 40px currentColor",animation:"cdpop 0.35s ease-out",fontFamily:"'Fira Code',Consolas,monospace",lineHeight:1}}>
              {countdown}
            </div>
          ):(
            <div style={{fontSize:"72px",fontWeight:"bold",color:"#fff",letterSpacing:"0.3em",
              textShadow:"0 0 30px #ffffff80",animation:"goshow 0.3s ease-out",fontFamily:"'Fira Code',Consolas,monospace"}}>
              GO!
            </div>
          )}
          {scenario&&<div style={{fontSize:"11px",color:"#ffffff60",marginTop:"16px",maxWidth:"360px",textAlign:"center",fontStyle:"italic",letterSpacing:"0.05em",lineHeight:"1.5"}}>{scenario}</div>}
          {!scenario&&<div style={{fontSize:"12px",color:"#ffffff40",marginTop:"16px",letterSpacing:"0.3em"}}>GET READY</div>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
